name: Supabase Keepalive

on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Supabase projects
        run: |
          set +e
          ping_project() {
            local name="$1"
            local url="$2"
            local key="$3"
            echo "=== Pinging $name ==="
            code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
              -H "apikey: $key" \
              -H "Authorization: Bearer $key" \
              "$url/rest/v1/")
            echo "$name -> HTTP $code"
          }
